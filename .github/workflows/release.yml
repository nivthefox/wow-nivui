name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: NivUI

      - name: Create zip
        run: zip -r NivUI-${{ github.event.release.tag_name }}.zip NivUI -x "NivUI/.git/*" -x "NivUI/.github/*" -x "NivUI/.luacheckrc"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: NivUI-${{ github.event.release.tag_name }}.zip

      - name: Announce on Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_TIMESTAMP: ${{ github.event.release.published_at }}
        run: |
          payload=$(jq -n \
            --arg title "NivUI ${RELEASE_NAME:-$RELEASE_TAG} released" \
            --arg url "$RELEASE_URL" \
            --arg body "${RELEASE_BODY:-No release notes provided.}" \
            --arg timestamp "$RELEASE_TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $body,
                color: 5814783,
                timestamp: $timestamp,
                footer: { text: "NivUI" }
              }]
            }')
          curl -fsS -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK"
